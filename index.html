<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>react-app</title>
  </head>
  <body>
    <div class="vh-100 d-flex flex-center bg-accent">
      <div class="container bg-page">
        <div class="">
          <form action="" class="form-container p-5">
            <fieldset class="form-fieldset">
              <legend class="form-legend">Choose option</legend>

              <div class="form-row">
                <div class="form-outline">
                  <input
                    id="name"
                    type="text"
                    class="form-control"
                    placeholder="John"
                  />
                  <label for="name" class="form-label">First Name</label>
                </div>

                <div class="form-outline">
                  <input
                    id="name1"
                    type="text"
                    class="form-control"
                    placeholder="Smith"
                  />
                  <label for="name1" class="form-label">Last Name</label>
                </div>
              </div>
            </fieldset>
          </form>
        </div>
      </div>
    </div>
    <!-- <div id="root"></div> -->

    <script type="module" src="/src/react/main.jsx"></script>
  </body>
</html>
